<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andean Journey | Portal de Acceso Premium</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS CDN para renderizado rápido de utilidades -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#001a2c',
                            cusco: '#c2410c',
                            gold: '#fbbf24'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #001a2c;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #001a2c; }
        ::-webkit-scrollbar-thumb { background: #c2410c; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12 sm:px-8 relative overflow-y-auto font-sans text-white">

    <!-- Elementos Decorativos de Fondo (Estilo Kokonut UI) -->
    <div class="absolute top-10 left-10 w-[400px] h-[400px] bg-orange-600/20 rounded-full blur-[140px] pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-[400px] h-[400px] bg-amber-500/20 rounded-full blur-[140px] pointer-events-none"></div>

    <!-- Contenedor Principal del Login -->
    <div class="w-full max-w-lg relative z-10 animate-fade-in">
        <div class="bg-[#002238]/90 backdrop-blur-3xl border border-orange-500/40 p-8 sm:p-12 rounded-[36px] shadow-[0_32px_80px_-12px_rgba(0,0,0,0.85)] relative">
            <!-- Inner highlight border -->
            <div class="absolute inset-0 rounded-[36px] border border-white/10 pointer-events-none"></div>
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-gradient-to-br from-orange-500 to-amber-400 mb-4 shadow-2xl shadow-orange-900/40 transform hover:scale-105 hover:rotate-6 transition-all duration-300">
                    <i data-lucide="mountain" class="w-8 h-8 sm:w-10 sm:h-10 text-white"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-outfit font-extrabold text-white mb-2 tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-300 bg-clip-text text-transparent">
                    Andean Journey
                </h1>
                <p class="text-slate-300 font-medium text-sm">Gestiona tus cotizaciones y aventuras premium</p>
            </div>

            <!-- Alertas de Error / Éxito -->
            <div id="alertBox" class="hidden items-center gap-3 p-4 mb-6 rounded-2xl text-sm font-semibold transition-all duration-300 shadow-lg">
                <i id="alertIcon" class="w-6 h-6 flex-shrink-0"></i>
                <span id="alertText" class="flex-1"></span>
            </div>

            <!-- Pastillas de Acceso Rápido (Demo Mode) -->
            <div class="grid grid-cols-2 gap-2 mb-8 p-2 bg-black/40 rounded-2xl border border-white/10 shadow-inner">
                <button type="button" onclick="setDemo('admin')" id="btnAdmin" class="demo-btn py-3 px-3 rounded-xl text-xs font-bold text-slate-400 hover:text-white flex items-center justify-center gap-2 transition-all cursor-pointer">
                    <i data-lucide="shield" class="w-4 h-4 shrink-0"></i> Admin Demo
                </button>
                <button type="button" onclick="setDemo('invitado')" id="btnGuest" class="demo-btn py-3 px-3 rounded-xl text-xs font-bold text-slate-400 hover:text-white flex items-center justify-center gap-2 transition-all cursor-pointer">
                    <i data-lucide="users" class="w-4 h-4 shrink-0"></i> Invitado (Portfolio)
                </button>
            </div>

            <form id="loginForm" class="space-y-6">
                <!-- Input Usuario -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-300 ml-1 uppercase tracking-wider block">Usuario / Correo Electrónico</label>
                    <div class="relative group">
                        <input 
                            type="text" 
                            id="username"
                            class="w-full bg-black/40 border border-white/15 rounded-2xl py-4 pl-12 pr-6 text-white placeholder:text-slate-500 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all font-medium text-sm"
                            placeholder="Introduce tu usuario (Ej: admin o invitado)"
                            required
                        />
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-orange-400 transition-colors"></i>
                    </div>
                </div>

                <!-- Input Contraseña -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-300 ml-1 uppercase tracking-wider block">Contraseña</label>
                    <div class="relative group">
                        <input 
                            type="password" 
                            id="password"
                            class="w-full bg-black/40 border border-white/15 rounded-2xl py-4 pl-12 pr-12 text-white placeholder:text-slate-500 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all font-medium text-sm"
                            placeholder="••••••••••••"
                            required
                        />
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-orange-400 transition-colors"></i>
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors p-1 cursor-pointer"
                        >
                            <i id="eyeIcon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Opciones Extra -->
                <div class="flex items-center justify-between text-sm py-1">
                    <label class="flex items-center gap-2.5 text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-black/50 text-orange-600 accent-orange-600 transition-all cursor-pointer" checked />
                        <span class="text-xs font-semibold">Mantener sesión activa</span>
                    </label>
                    <a href="#" class="text-xs font-bold text-orange-400 hover:text-orange-300 transition-colors underline">¿Olvidaste tu clave?</a>
                </div>

                <!-- Botón Submit -->
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-gradient-to-r from-orange-600 via-amber-500 to-orange-500 hover:from-orange-500 hover:to-amber-400 text-white py-4 px-8 rounded-2xl font-extrabold text-base tracking-wide shadow-xl shadow-orange-900/40 transform transition-all active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-3 overflow-hidden relative cursor-pointer border border-orange-400/40 mt-6"
                >
                    <span id="btnText">Entrar al Sistema Premium</span>
                    <i id="btnSpinner" data-lucide="loader-2" class="w-6 h-6 animate-spin hidden text-white"></i>
                </button>

                <!-- Divisor Social -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-widest font-bold">
                        <span class="bg-[#002238] px-4 text-slate-400">O acceder mediante</span>
                    </div>
                </div>

                <!-- Botones Sociales -->
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" class="flex items-center justify-center gap-2.5 bg-white/5 border border-white/10 py-3.5 rounded-2xl hover:bg-white/10 transition-all font-semibold text-xs text-slate-200 hover:text-white cursor-pointer shadow-sm">
                        <i data-lucide="globe" class="w-4 h-4 text-amber-400"></i> Google SSO
                    </button>
                    <button type="button" class="flex items-center justify-center gap-2.5 bg-white/5 border border-white/10 py-3.5 rounded-2xl hover:bg-white/10 transition-all font-semibold text-xs text-slate-200 hover:text-white cursor-pointer shadow-sm">
                        <i data-lucide="key" class="w-4 h-4 text-orange-400"></i> Acceso Corporativo
                    </button>
                </div>
            </form>

            <!-- Soporte -->
            <p class="text-center text-slate-400 text-xs mt-8 font-medium">
                ¿Necesitas explorar el portafolio? <span onclick="setDemo('invitado')" class="text-amber-400 font-bold cursor-pointer hover:underline transition-all">Iniciar como Invitado</span>
            </p>

        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        const DEMO_CREDENTIALS = {
            'admin': 'andean2025',
            'invitado': 'demo123'
        };

        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertText = document.getElementById('alertText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        let isPasswordVisible = false;

        function togglePassword() {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            document.getElementById('eyeIcon').setAttribute('data-lucide', isPasswordVisible ? 'eye-off' : 'eye');
            lucide.createIcons();
        }

        function setDemo(role) {
            // Actualizar botones demo
            document.querySelectorAll('.demo-btn').forEach(b => {
                b.className = "demo-btn py-3 px-3 rounded-xl text-xs font-bold text-slate-400 hover:text-white flex items-center justify-center gap-2 transition-all cursor-pointer";
            });

            const activeBtn = role === 'admin' ? document.getElementById('btnAdmin') : document.getElementById('btnGuest');
            activeBtn.className = "demo-btn py-3 px-3 rounded-xl text-xs font-bold text-white bg-gradient-to-r from-orange-600 to-amber-500 border border-orange-400/40 shadow-lg shadow-orange-900/50 flex items-center justify-center gap-2 transition-all cursor-pointer";

            // Rellenar inputs
            usernameInput.value = role;
            passwordInput.value = DEMO_CREDENTIALS[role];
            alertBox.classList.add('hidden');
        }

        function showAlert(msg, type) {
            alertBox.className = `flex items-center gap-3 p-4 mb-6 rounded-2xl text-sm font-semibold transition-all duration-300 shadow-lg ${
                type === 'success' 
                    ? 'bg-green-500/20 border border-green-500/40 text-green-300' 
                    : 'bg-red-500/20 border border-red-500/40 text-red-300'
            }`;
            alertIcon.setAttribute('data-lucide', type === 'success' ? 'check-circle-2' : 'alert-circle');
            alertText.innerText = msg;
            lucide.createIcons();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('Por favor completa todos los campos', 'error');
                return;
            }

            // Estado de carga
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            alertBox.classList.add('hidden');

            // Simulación suave de latencia
            await new Promise(r => setTimeout(r, 800));

            if (DEMO_CREDENTIALS[username] === password) {
                sessionStorage.setItem('andean_session', JSON.stringify({
                    username: username,
                    loginTime: new Date().toISOString(),
                    isAuthenticated: true,
                    isDemo: username === 'invitado'
                }));
                showAlert('¡Acceso concedido! Redirigiendo al sistema...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                showAlert('Usuario o contraseña incorrectos', 'error');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
