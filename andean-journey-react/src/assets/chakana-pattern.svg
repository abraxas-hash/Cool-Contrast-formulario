<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Wool background -->
  <rect width="120" height="120" fill="#fdfaf6" />
  
  <g opacity="0.6">
    <!-- Corner Diamonds (make a large diamond when tiled) -->
    <polygon fill="#2a7e68" points="0,0 30,0 0,30" />
    <polygon fill="#2a7e68" points="120,0 120,30 90,0" />
    <polygon fill="#2a7e68" points="0,120 30,120 0,90" />
    <polygon fill="#2a7e68" points="120,120 120,90 90,120" />
    
    <!-- Corner inner accents -->
    <polygon fill="#d99728" points="0,0 15,0 0,15" />
    <polygon fill="#d99728" points="120,0 120,15 105,0" />
    <polygon fill="#d99728" points="0,120 15,120 0,105" />
    <polygon fill="#d99728" points="120,120 120,105 105,120" />

    <!-- Main Chakana (Terracotta Red) -->
    <path fill="#b9392e" d="M45 15 h30 v30 h30 v30 h-30 v30 h-30 v-30 h-30 v-30 h30 z" />
    
    <!-- Inner Chakana (Mustard Yellow) -->
    <path fill="#d99728" d="M55 40 h10 v15 h15 v10 h-15 v15 h-10 v-15 h-15 v-10 h15 z" />
    
    <!-- Center Square (Navy Blue) -->
    <rect x="55" y="55" width="10" height="10" fill="#254559" />

    <!-- Connectors (Plum Purple) -->
    <rect x="0" y="55" width="15" height="10" fill="#693b58" />
    <rect x="105" y="55" width="15" height="10" fill="#693b58" />
    <rect x="55" y="0" width="10" height="15" fill="#693b58" />
    <rect x="55" y="105" width="10" height="15" fill="#693b58" />
  </g>
</svg>
