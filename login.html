<!DOCTYPE html>
<html lang="es">
<head>
    <!-- ======================================== 
         SECCIÓN PRINCIPAL: Sistema de Autenticación ORES Travel
         Propósito: Login con glassmorphism design para sistema de cotizaciones
         Funcionalidades: Autenticación, validación, redirección al dashboard
    ======================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORES Travel Perú - Sistema de Cotizaciones</title>
    
    <style>
        /* ==========================================
           COMPONENTE: Variables CSS - Theming ORES Travel
           Colores adaptados al turismo y Perú
        ========================================== */
        :root { 
            /* Colores ORES Travel - Inspirados en paisajes peruanos */
            --primary: #c2410c; /* Naranja cálido - Atardecer en Cusco */
            --primary-dark: #9a3412; 
            --secondary: #0c4a6e; /* Azul profundo - Cielo andino */
            --secondary-light: #0369a1; 
            --accent: #059669; /* Verde esmeralda - Selva amazónica */
            --gold: #fbbf24; /* Dorado - Sol inca */
            --gold-dark: #d97706;
            --success: #10b981; 
            --warning: #f59e0b; 
            --error: #ef4444; 
            
            /* Glassmorphism y tipografía */
            --text-primary: #ffffff; 
            --text-secondary: #e2e8f0; 
            --text-muted: #94a3b8; 
            --glass-bg: rgba(255, 255, 255, 0.1); 
            --glass-border: rgba(255, 255, 255, 0.2); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ==========================================
           COMPONENTE: Body - Fondo con paisaje peruano abstracto
        ========================================== */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0c4a6e 0%, #164e63 20%, #c2410c 60%, #9a3412 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: var(--text-primary); 
            overflow: hidden; 
        }
        
        /* ==========================================
           COMPONENTE: Container - Glassmorphism principal
        ========================================== */
        .login-container { 
            background: var(--glass-bg); 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border); 
            border-radius: 28px; 
            padding: 48px 40px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); 
            animation: slideUp 1s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden; 
        }
        
        /* Borde superior con colores peruanos */
        .login-container::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 4px; 
            background: linear-gradient(90deg, var(--primary), var(--gold), var(--accent)); 
            animation: shimmer 3s ease-in-out infinite; 
        }
        
        /* ==========================================
           ANIMACIONES: Efectos visuales
        ========================================== */
        @keyframes slideUp { 
            from { transform: translateY(60px) scale(0.9); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }
        
        @keyframes shimmer { 
            0%, 100% { transform: translateX(-100%); } 
            50% { transform: translateX(100%); } 
        }
        
        @keyframes logoFloat { 
            0%, 100% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(-8px) rotate(2deg); } 
        }
        
        /* ==========================================
           COMPONENTE: Logo Section - ORES Travel branding
        ========================================== */
        .logo-section { 
            text-align: center; 
            margin-bottom: 48px; 
        }
        
        .logo-icon { 
            font-size: 4.5rem; 
            margin-bottom: 20px; 
            display: block; 
            text-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); 
            animation: logoFloat 6s ease-in-out infinite; 
        }
        
        .logo-title { 
            color: var(--text-primary); 
            font-size: 2rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); 
            background: linear-gradient(135deg, var(--text-primary), var(--gold)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
        }
        
        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        /* ==========================================
           COMPONENTE: Form Elements
        ========================================== */
        .form-group { 
            margin-bottom: 28px; 
            position: relative; 
        }
        
        .form-label { 
            display: block; 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            font-weight: 700; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .form-input { 
            width: 100%; 
            padding: 18px 24px; 
            background: rgba(255, 255, 255, 0.08); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; 
            color: var(--text-primary); 
            font-size: 1.1rem; 
            font-weight: 500; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            backdrop-filter: blur(20px); 
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1); 
        }
        
        .form-input::placeholder { 
            color: var(--text-muted); 
            font-weight: 400; 
        }
        
        .form-input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(255, 255, 255, 0.12); 
            box-shadow: 0 0 0 4px rgba(194, 65, 12, 0.15), inset 0 2px 8px rgba(0, 0, 0, 0.1); 
            transform: translateY(-2px); 
        }
        
        .input-icon { 
            position: absolute; 
            right: 20px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 1.2rem; 
            color: var(--text-muted); 
            pointer-events: none; 
            transition: all 0.3s ease; 
        }
        
        .form-input:focus + .input-icon { 
            color: var(--primary); 
        }
        
        /* ==========================================
           COMPONENTE: Login Button
        ========================================== */
        .login-button { 
            width: 100%; 
            padding: 20px 32px; 
            background: linear-gradient(135deg, var(--primary), var(--gold)); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-size: 1.2rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            box-shadow: 0 12px 32px rgba(194, 65, 12, 0.3); 
            margin-top: 24px; 
            position: relative; 
            overflow: hidden; 
        }
        
        .login-button::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: -100%; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); 
            transition: left 0.6s; 
        }
        
        .login-button:hover::before { 
            left: 100%; 
        }
        
        .login-button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 40px rgba(194, 65, 12, 0.4); 
        }
        
        .login-button:disabled { 
            background: linear-gradient(135deg, var(--text-muted), #5a6c7d); 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }
        
        /* ==========================================
           COMPONENTE: Loading Spinner
        ========================================== */
        .loading-spinner { 
            display: none; 
            width: 28px; 
            height: 28px; 
            border: 3px solid rgba(255, 255, 255, 0.3); 
            border-top: 3px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto; 
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* ==========================================
           COMPONENTE: Messages - Notificaciones
        ========================================== */
        .message { 
            padding: 18px 24px; 
            border-radius: 16px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            margin-bottom: 24px; 
            display: none; 
            backdrop-filter: blur(10px); 
            animation: messageSlide 0.5s ease-out; 
        }
        
        @keyframes messageSlide { 
            from { transform: translateX(-20px); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        
        .error-message { 
            background: rgba(239, 68, 68, 0.15); 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            color: var(--error); 
        }
        
        .success-message { 
            background: rgba(16, 185, 129, 0.15); 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            color: var(--success); 
        }
        
        /* ==========================================
           RESPONSIVE: Mobile-first design
        ========================================== */
        @media (max-width: 480px) { 
            .login-container { padding: 36px 24px; } 
            .logo-title { font-size: 1.7rem; } 
            .logo-icon { font-size: 3.5rem; } 
            .form-input { padding: 16px 20px; font-size: 1rem; } 
            .login-button { padding: 18px 24px; font-size: 1.1rem; } 
        }
        
        /* Animaciones staggered */
        .form-group, .login-button { 
            animation: fadeInUp 0.8s ease-out both; 
        }
        
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        .login-button { animation-delay: 0.4s; }
        
        @keyframes fadeInUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo Section: ORES Travel branding -->
        <div class="logo-section">
            <div class="logo-icon">🏔️</div>
            <h1 class="logo-title">ORES Travel</h1>
            <p class="logo-subtitle">Sistema de Cotizaciones Perú</p>
        </div>

        <!-- Form de autenticación -->
        <form id="loginForm">
            <div id="messageContainer"></div>
            
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <div style="position: relative;">
                    <input type="text" id="username" name="username" class="form-input" placeholder="Ingresa tu usuario" required autocomplete="username">
                    <div class="input-icon">👤</div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-input" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    <div class="input-icon">🔒</div>
                </div>
            </div>
            
            <button type="submit" class="login-button" id="loginButton">
                <span id="loginText">Acceder al Sistema</span>
                <div class="loading-spinner" id="loadingSpinner"></div>
            </button>
        </form>
    </div>

    <script>
        // Referencias DOM
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const loginText = document.getElementById('loginText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const messageContainer = document.getElementById('messageContainer');

        // Credenciales demo (en producción usar API real)
        const DEMO_CREDENTIALS = {
            'admin': 'ores2024',
            'cotizador': 'ores2024'
        };

        // Event listener para el formulario
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('Por favor completa todos los campos', 'error');
                return;
            }
            
            await authenticate(username, password);
        });

        async function authenticate(username, password) {
            showLoading(true);
            hideMessages();
            
            try {
                // Simulación de autenticación (reemplazar con API real)
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                if (DEMO_CREDENTIALS[username] === password) {
                    // Guardar sesión con expiración de 8 horas
                    sessionStorage.setItem('ores_session', JSON.stringify({
                        username: username,
                        loginTime: new Date().toISOString(),
                        expiresAt: new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString(),
                        isAuthenticated: true
                    }));
                    
                    showMessage(`✅ ¡Bienvenido al sistema ORES Travel!`, 'success');
                    
                    // Redirección al dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    throw new Error('Credenciales inválidas');
                }
            } catch (error) {
                showMessage('❌ Usuario o contraseña incorrectos', 'error');
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            if (show) {
                loginText.style.display = 'none';
                loadingSpinner.style.display = 'block';
                loginButton.disabled = true;
            } else {
                loginText.style.display = 'block';
                loadingSpinner.style.display = 'none';
                loginButton.disabled = false;
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            
            messageContainer.innerHTML = '';
            messageContainer.appendChild(messageDiv);
        }

        function hideMessages() {
            messageContainer.innerHTML = '';
        }
    </script>
</body>
</html>
